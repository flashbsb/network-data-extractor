# ==============================================================================
# Network Data Extractor - Commands List (Example)
# Format: <commands_key>;<cli_command>
# ==============================================================================

# Cisco IOS Example
cisco_ios;terminal length 0
cisco_ios;show version
cisco_ios;show inventory
cisco_ios;show running-config | include hostname
cisco_ios;show lldp neighbors detail

# Cisco IOS XE Example
cisco_ios_xe;terminal length 0
cisco_ios_xe;show version
cisco_ios_xe;show platform
cisco_ios_xe;show lldp neighbors detail

# Cisco NX-OS Example
cisco_nxos;terminal length 0
cisco_nxos;show version
cisco_nxos;show inventory
cisco_nxos;show lldp neighbors detail

# Cisco IOS XR Example
cisco_ios_xr;terminal length 0
cisco_ios_xr;show version
cisco_ios_xr;show inventory
cisco_ios_xr;show lldp neighbors detail

# Datacom DMOS Example
datacom_dmos;show system
datacom_dmos;show firmware
datacom_dmos;show interfaces status
datacom_dmos;show running-config interface lldp

# Huawei VRP Example
huawei_vrp;display version
huawei_vrp;display device
huawei_vrp;display lldp neighbor apple-style